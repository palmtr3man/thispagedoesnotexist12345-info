<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reject &amp; Return | The Ultimate Journey</title>
    <meta name="robots" content="noindex,nofollow">
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      :root {
        --bg-deep: #0D1B2A; --bg-mid: #1C1C2E;
        --accent-teal: #00E5CC; --text-primary: #E8EDF2; --text-muted: #8A9BB0;
        --border: rgba(0,229,204,0.15);
      }
      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: var(--bg-deep);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        background: var(--bg-mid);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 64px 48px;
        text-align: center;
        max-width: 520px;
        width: 100%;
      }
      .eyebrow {
        font-size: 0.72em;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent-teal);
        margin-bottom: 20px;
      }
      h1 { font-size: 2em; font-weight: 800; margin-bottom: 16px; letter-spacing: -0.02em; }
      p { color: var(--text-muted); font-size: 0.95em; line-height: 1.75; margin-bottom: 36px; }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: var(--accent-teal);
        color: #0D1B2A;
        padding: 14px 36px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 700;
        font-size: 0.95em;
        transition: opacity 0.2s;
      }
      .btn:hover { opacity: 0.9; }
      .back-link {
        display: block;
        margin-top: 24px;
        color: var(--text-muted);
        font-size: 0.82em;
        text-decoration: none;
        transition: color 0.2s;
      }
      .back-link:hover { color: var(--accent-teal); }
    </style>
  </head>
  <body>
    <div class="card">
      <p class="eyebrow">The Ultimate Journey</p>
      <h1>Ready to Return?</h1>
      <p>The door is always open. Subscribe to get back on board — access the Field Guide, tools, and the full journey.</p>
      <a href="https://newsletter.thispagedoesnotexist12345.us/" class="btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        Subscribe &amp; Return
      </a>
      <a href="/" class="back-link">Back to Field Guide</a>
    </div>
  </body>
</html>
